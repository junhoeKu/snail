<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Snail — 달팽이 키우기</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/stats.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body data-background="default">
  <div id="app">

    <main class="app-main">

      <!-- 홈 (서식지) -->
      <section id="screen-home" class="screen active">

        <!-- 알 상태 (온보딩) -->
        <div id="egg-view" class="card egg-view hidden">
          <div class="egg-emoji">🥚</div>
          <p class="egg-guide">알이 도착했어요!<br>달팽이의 이름을 지어주세요.</p>
          <input id="snail-name-input" class="text-input" type="text" maxlength="12" placeholder="이름 (최대 12자)">
          <button id="btn-hatch" class="btn btn-primary btn-wide">부화시키기</button>
        </div>

        <!-- 달팽이 서식지 -->
        <div id="snail-view" class="hidden">
          <div class="snail-habitat" id="snail-habitat">
            <div class="snail-entity" id="snail-entity">
              <div class="snail-motion">
                <span id="snail-sprite" class="snail-sprite">
                  <!-- 실사풍 달팽이 (왼쪽을 바라봄 — 반전 로직 기준) -->
                  <svg class="snail-svg" viewBox="0 0 120 90" role="img" aria-label="달팽이">
                    <defs>
                      <radialGradient id="shell-grad" cx="38%" cy="32%" r="78%">
                        <stop offset="0%" style="stop-color: var(--shell-light)"/>
                        <stop offset="62%" style="stop-color: var(--shell-mid)"/>
                        <stop offset="100%" style="stop-color: var(--shell-dark)"/>
                      </radialGradient>
                      <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" style="stop-color: var(--body-light)"/>
                        <stop offset="100%" style="stop-color: var(--body-dark)"/>
                      </linearGradient>
                    </defs>
                    <ellipse cx="58" cy="83" rx="44" ry="4.5" fill="rgba(25, 22, 12, 0.22)"/>
                    <path d="M12 80 Q8 66 20 59 Q29 55 33 46 Q36 37 43 37 Q50 37 51 46 L53 62
                             Q72 53 94 63 Q106 69 104 80 Z" fill="url(#body-grad)"/>
                    <path d="M16 74 Q30 68 50 66" stroke="rgba(255,255,255,0.25)" stroke-width="2"
                          fill="none" stroke-linecap="round"/>
                    <g class="snail-face">
                      <path d="M35 40 Q28 29 22 22" stroke="var(--body-dark)" stroke-width="3"
                            fill="none" stroke-linecap="round"/>
                      <path d="M44 38 Q44 26 40 17" stroke="var(--body-dark)" stroke-width="3"
                            fill="none" stroke-linecap="round"/>
                      <circle cx="21" cy="21" r="3.4" fill="var(--body-dark)"/>
                      <circle cx="39.5" cy="16" r="3.4" fill="var(--body-dark)"/>
                      <circle cx="20" cy="20" r="1.1" fill="#fff" opacity="0.85"/>
                      <circle cx="38.5" cy="15" r="1.1" fill="#fff" opacity="0.85"/>
                    </g>
                    <circle cx="74" cy="47" r="30" fill="url(#shell-grad)"/>
                    <path d="M74 47 m-23 0 a23 23 0 1 1 46 0 a18 18 0 1 1 -36 0 a13 13 0 1 1 26 0
                             a8 8 0 1 1 -16 0 a4 4 0 1 1 8 0"
                          fill="none" stroke="var(--shell-line)" stroke-width="2.4"
                          opacity="0.5" stroke-linecap="round"/>
                    <ellipse cx="63" cy="33" rx="11" ry="6" fill="#fff" opacity="0.22"
                             transform="rotate(-24 63 33)"/>
                  </svg>
                </span>
              </div>
            </div>
            <div id="food-layer"></div>
          </div>

          <!-- 서식지 오버레이 -->
          <div class="home-overlay">
            <button id="snail-chip" class="chip chip-left">
              <span id="chip-name-level"></span>
              <span class="chip-gauges">
                <i class="fa-solid fa-utensils"></i> <span id="chip-hunger">0</span>%
                &nbsp;<i class="fa-solid fa-face-smile"></i> <span id="chip-happiness">0</span>%
              </span>
            </button>
            <div class="chip chip-right">
              <i class="fa-solid fa-coins"></i> <span id="coin-count">0</span>
              &nbsp;·&nbsp;
              <i class="fa-solid fa-leaf"></i> <span id="food-count">0</span>
            </div>
            <div class="fab-group">
              <button id="btn-feed" class="fab" title="먹이주기">
                <i class="fa-solid fa-leaf"></i><span>먹이</span>
              </button>
              <button id="btn-walk" class="fab" title="산책">
                <i class="fa-solid fa-person-walking"></i><span>산책</span>
              </button>
            </div>
            <button id="mission-chip" class="chip chip-missions">
              <i class="fa-solid fa-list-check"></i> 오늘의 돌봄 <span id="mission-progress">0/3</span>
            </button>
          </div>
        </div>

      </section>

      <!-- 달팽이 (스탯 + 성장 일지) -->
      <section id="screen-stats" class="screen">
        <div class="card">
          <h2 class="screen-title"><i class="fa-solid fa-chart-simple"></i> 달팽이</h2>
          <p class="stats-identity">
            <strong id="stats-name">-</strong> · Lv.<span id="stats-level">-</span>
            <span id="stats-stage"></span> 달팽이
          </p>
          <p id="stats-traits" class="stats-traits"></p>

          <div class="stat">
            <div class="stat-head"><span><i class="fa-solid fa-star"></i> 경험치</span><span id="exp-text">0 / 20</span></div>
            <div class="stat-bar"><div id="bar-exp" class="stat-fill fill-exp"></div></div>
          </div>
          <div class="stat">
            <div class="stat-head"><span><i class="fa-solid fa-utensils"></i> 배고픔</span><span id="hunger-text">0%</span></div>
            <div class="stat-bar"><div id="bar-hunger" class="stat-fill fill-hunger"></div></div>
          </div>
          <div class="stat">
            <div class="stat-head"><span><i class="fa-solid fa-face-smile"></i> 행복</span><span id="happiness-text">0%</span></div>
            <div class="stat-bar"><div id="bar-happiness" class="stat-fill fill-happiness"></div></div>
          </div>

          <p id="stats-next" class="stats-next"></p>

          <h3 class="journal-title"><i class="fa-solid fa-book-open"></i> 성장 일지</h3>
          <ul id="journal-list" class="journal-list"></ul>
        </div>
      </section>

      <!-- 상점 -->
      <section id="screen-shop" class="screen">
        <div class="card shop-card">
          <h2 class="screen-title"><i class="fa-solid fa-store"></i> 상점</h2>
          <p class="shop-coins">보유 코인: <strong id="shop-coins">0</strong> <i class="fa-solid fa-coins"></i></p>

          <div class="shop-item">
            <div class="shop-item-info">
              <span class="shop-item-icon"><i class="fa-solid fa-leaf"></i></span>
              <div>
                <div class="shop-item-name">상추</div>
                <div class="shop-item-desc">배고픔 -30 · 경험치 +10</div>
              </div>
            </div>
            <button id="btn-buy-food" class="btn btn-primary btn-sm">10 <i class="fa-solid fa-coins"></i></button>
          </div>
        </div>
      </section>

      <!-- 꾸미기 -->
      <section id="screen-deco" class="screen">
        <div class="card">
          <h2 class="screen-title"><i class="fa-solid fa-palette"></i> 꾸미기</h2>
          <p class="screen-desc">서식지 배경을 선택하세요.</p>
          <div class="shop-backgrounds">
            <button class="bg-option" data-bg="default"><i class="fa-solid fa-seedling"></i> 이끼 숲</button>
            <button class="bg-option" data-bg="garden"><i class="fa-solid fa-sun"></i> 햇살 정원</button>
          </div>
        </div>
      </section>

      <!-- 설정 -->
      <section id="screen-settings" class="screen">
        <div class="card">
          <h2 class="screen-title"><i class="fa-solid fa-gear"></i> 설정</h2>

          <h3 class="settings-subtitle">게임 규칙</h3>
          <ul id="rules-list" class="rules-list"></ul>

          <h3 class="settings-subtitle">데이터</h3>
          <button id="btn-reset" class="btn btn-danger btn-wide">데이터 초기화</button>
          <p class="settings-version">Snail v0.4.0 · Vanilla JS + LocalStorage</p>
        </div>
      </section>

    </main>

    <!-- 하단 탭 바 -->
    <nav class="tab-bar">
      <button class="tab" data-screen="stats">
        <i class="fa-solid fa-chart-simple"></i><span>달팽이</span>
      </button>
      <button class="tab" data-screen="shop">
        <i class="fa-solid fa-store"></i><span>상점</span>
      </button>
      <button class="tab tab-home" data-screen="home" title="홈">
        <i class="fa-solid fa-house"></i>
      </button>
      <button class="tab" data-screen="deco">
        <i class="fa-solid fa-palette"></i><span>꾸미기</span>
      </button>
      <button class="tab" data-screen="settings">
        <i class="fa-solid fa-gear"></i><span>설정</span>
      </button>
    </nav>

  </div>

  <div id="toast-container"></div>
  <div id="modal-root"></div>

  <!-- 상추 (먹이) — HabitatModule이 복제해 사용 -->
  <template id="food-template">
    <svg class="food-svg" viewBox="0 0 40 40" width="30" height="30" role="img" aria-label="상추">
      <path d="M20 36 Q8 34 6 22 Q5 12 13 8 Q20 4 27 8 Q35 12 34 22 Q32 34 20 36 Z" fill="#7fa95c"/>
      <path d="M20 36 Q14 24 20 8 M20 36 Q25 26 28 12 M20 36 Q13 28 10 16"
            stroke="#5d8341" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M13 8 Q20 14 27 8" stroke="#96bd74" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </svg>
  </template>

  <script src="js/db.js"></script>
  <script src="js/game.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/home.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/deco.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/habitat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
