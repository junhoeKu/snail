<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snail — 달팽이 키우기</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/shop.css">
</head>
<body data-background="default">
  <div id="app">

    <header class="app-header">
      <h1 class="app-title">🐌 Snail</h1>
      <div class="wallet">
        <span class="wallet-item"><i class="fa-solid fa-coins"></i> <span id="coin-count">0</span></span>
        <span class="wallet-item">🥬 <span id="food-count">0</span></span>
      </div>
    </header>

    <main class="app-main">

      <!-- 홈 화면 -->
      <section id="screen-home" class="screen active">

        <!-- 알 상태 (온보딩) -->
        <div id="egg-view" class="card egg-view hidden">
          <div class="egg-emoji">🥚</div>
          <p class="egg-guide">알이 도착했어요!<br>달팽이의 이름을 지어주세요.</p>
          <input id="snail-name-input" class="text-input" type="text" maxlength="12" placeholder="이름 (최대 12자)">
          <button id="btn-hatch" class="btn btn-primary btn-wide">부화시키기</button>
        </div>

        <!-- 달팽이 상태 -->
        <div id="snail-view" class="hidden">
          <div class="card snail-card">
            <div id="snail-sprite" class="snail-sprite">🐌</div>
            <h2 id="snail-name" class="snail-name"></h2>
            <div class="snail-level">Lv.<span id="snail-level">1</span> · <span id="snail-stage-label">아기</span> 달팽이</div>

            <div class="stat">
              <div class="stat-head"><span>⭐ 경험치</span><span id="exp-text">0 / 20</span></div>
              <div class="stat-bar"><div id="bar-exp" class="stat-fill fill-exp"></div></div>
            </div>
            <div class="stat">
              <div class="stat-head"><span>🍀 배고픔</span><span id="hunger-text">0%</span></div>
              <div class="stat-bar"><div id="bar-hunger" class="stat-fill fill-hunger"></div></div>
            </div>
            <div class="stat">
              <div class="stat-head"><span>😊 행복</span><span id="happiness-text">100%</span></div>
              <div class="stat-bar"><div id="bar-happiness" class="stat-fill fill-happiness"></div></div>
            </div>
          </div>

          <div class="actions">
            <button id="btn-feed" class="btn btn-primary">🥬 먹이주기</button>
            <button id="btn-walk" class="btn btn-secondary">🚶 산책</button>
            <button id="btn-goto-shop" class="btn btn-ghost">🛒 상점</button>
          </div>
        </div>

      </section>

      <!-- 상점 화면 -->
      <section id="screen-shop" class="screen">
        <button id="btn-back-home" class="btn btn-ghost btn-back"><i class="fa-solid fa-arrow-left"></i> 홈으로</button>

        <div class="card shop-card">
          <h2 class="shop-title"><i class="fa-solid fa-store"></i> 상점</h2>
          <p class="shop-coins">보유 코인: <strong id="shop-coins">0</strong> 🪙</p>

          <div class="shop-item">
            <div class="shop-item-info">
              <span class="shop-item-emoji">🥬</span>
              <div>
                <div class="shop-item-name">상추</div>
                <div class="shop-item-desc">배고픔 -30 · 경험치 +10</div>
              </div>
            </div>
            <button id="btn-buy-food" class="btn btn-primary btn-sm">10 🪙</button>
          </div>

          <h3 class="shop-subtitle">배경 교체</h3>
          <div class="shop-backgrounds">
            <button class="bg-option" data-bg="default">🌱 풀밭</button>
            <button class="bg-option" data-bg="garden">🌷 정원</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <div id="toast-container"></div>
  <div id="modal-root"></div>

  <script src="js/db.js"></script>
  <script src="js/game.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/home.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
