name: Deploy Smoke

# main 병합 시 Railway가 백엔드를 자동 배포한다(그게 CD). 이 워크플로는 배포가
# 반영되기를 기다렸다 운영 API가 살아있고 핵심 엔드포인트가 동작하는지 검증한다.
on:
  push:
    branches: [main]

jobs:
  smoke:
    name: 운영 API 스모크
    runs-on: ubuntu-latest
    steps:
      - name: 배포 반영 대기 + 헬스/핵심 엔드포인트 검증
        run: |
          API="https://snail-production-2a89.up.railway.app"
          # 엔드포인트가 기대 문자열을 반환할 때까지 재시도 (배포 중 재시작 순간의 일시적 5xx 오탐 방지)
          probe() { # $1=path $2=grep-pattern
            for i in $(seq 1 30); do
              body=$(curl -s -m 8 "$API$1" || true)
              if echo "$body" | grep -q "$2"; then return 0; fi
              sleep 10
            done
            echo "❌ $1 (기대: $2)"; return 1
          }
          probe "/healthz" '"ok":true' || exit 1
          probe "/v1/game/config" '"pond"' || exit 1
          probe "/v1/notices/active" '"notices"' || exit 1
          echo "✅ 운영 스모크 통과"
