name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: 백엔드 (pytest + 마이그레이션)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: snail_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        working-directory: backend
        run: pip install -e '.[dev]'
      - name: pytest (인메모리 SQLite)
        working-directory: backend
        run: pytest -q
      - name: 마이그레이션 검증 (운영 경로 — create_all → alembic idempotent)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/snail_test
        run: |
          # 운영은 create_all이 스키마를 만들고 alembic이 그 위에 얹힌다(하이브리드).
          # alembic을 두 번 실행해 재실행 안전성(idempotent)까지 검증한다.
          python -c "from app.core.database import Base, engine; import app.models; Base.metadata.create_all(engine)"
          alembic upgrade head
          alembic upgrade head

  frontend:
    name: 프론트 (문법 + jsdom 회귀 + sw-guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # sw-guard가 base와 diff하려면 히스토리 필요
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: jsdom 설치
        run: npm install --no-audit --no-fund
      - name: JS 문법 검사
        run: for f in js/*.js; do node --check "$f"; done
      - name: jsdom 회귀 테스트
        run: npm test
      - name: sw-guard (자산 변경 시 CACHE_VERSION 확인)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          bash scripts/check-sw-version.sh "origin/${{ github.base_ref }}"
